<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>EPL 온라인 학습 플랫폼</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@latest/dist/web/static/pretendard.css">
<link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Caveat:wght@600;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
:root{
  --bg:#FFF8F0;--bg-card:#FFFFFF;--bg-deep:#F5EDE0;
  --ink:#2D2926;--ink-soft:#5C554E;--ink-mute:#9A928A;
  --accent:#E8734A;--accent-soft:#F49D7A;
  --blue:#5B9BD5;--green:#6BBF8A;--purple:#9B7ED8;--yellow:#F4C84B;--pink:#E88BAF;--red:#E85D5D;
  --shadow:0 2px 8px rgba(0,0,0,.08);--shadow-block:0 3px 0 rgba(0,0,0,.12);
  --radius:12px;--radius-block:8px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-family:'Pretendard',sans-serif;font-size:15px;line-height:1.6;min-height:100vh}

/* ═══ 로그인 화면 ═══ */
.login-view{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.login-box{background:var(--bg-card);border-radius:var(--radius);box-shadow:0 8px 40px rgba(0,0,0,.12);padding:48px 40px;max-width:400px;width:100%;text-align:center}
.login-box .brand{font-family:'Gowun Batang',serif;font-size:32px;font-weight:700;margin-bottom:4px}
.login-box .brand em{font-family:'Caveat',cursive;font-style:normal;color:var(--accent);font-size:38px}
.login-box .subtitle{font-size:14px;color:var(--ink-mute);margin-bottom:32px}
.login-box input{width:100%;padding:12px 16px;border:1.5px solid var(--bg-deep);border-radius:var(--radius-block);font-family:inherit;font-size:15px;background:var(--bg);outline:none;margin-bottom:12px;transition:border-color .15s}
.login-box input:focus{border-color:var(--accent)}
.login-box .login-btn{width:100%;padding:14px;border:none;border-radius:var(--radius-block);background:var(--accent);color:#fff;font-family:inherit;font-size:16px;font-weight:700;cursor:pointer;box-shadow:0 3px 0 #c45a30;transition:all .15s;margin-top:8px}
.login-box .login-btn:hover{transform:translateY(-1px);box-shadow:0 4px 0 #c45a30}
.login-box .login-error{color:var(--red);font-size:13px;margin-top:8px;min-height:20px}
.login-box .mascot{font-size:60px;margin-bottom:16px}

/* ═══ Header ═══ */
.header{background:var(--bg-card);border-bottom:1px solid var(--bg-deep);padding:16px 24px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;box-shadow:var(--shadow)}
.header-brand{font-family:'Gowun Batang',serif;font-weight:700;font-size:22px;color:var(--ink)}
.header-brand em{font-family:'Caveat',cursive;font-style:normal;color:var(--accent);font-size:26px}
.header-sub{font-size:12px;color:var(--ink-mute)}
.header-actions{display:flex;gap:8px;align-items:center}

/* ═══ 공통 버튼 ═══ */
.btn{padding:10px 20px;border:none;border-radius:var(--radius-block);font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:6px}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-primary{background:var(--accent);color:#fff;box-shadow:0 3px 0 #c45a30}.btn-primary:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 4px 0 #c45a30}
.btn-secondary{background:var(--bg-deep);color:var(--ink)}.btn-secondary:hover{background:#ebe2d0}
.btn-success{background:var(--green);color:#fff;box-shadow:0 3px 0 #4ea06a}
.btn-danger{background:var(--red);color:#fff;box-shadow:0 3px 0 #b94545}
.btn-sm{padding:6px 14px;font-size:12px}

/* ═══ Admin 탭 ═══ */
.admin-view{max-width:1000px;margin:0 auto;padding:24px}
.admin-tabs{display:flex;gap:0;border-bottom:2px solid var(--bg-deep);margin-bottom:24px}
.admin-tab{padding:12px 24px;font-weight:700;font-size:14px;color:var(--ink-mute);cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .15s}
.admin-tab:hover{color:var(--ink)}
.admin-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.admin-panel{display:none}
.admin-panel.active{display:block}
.admin-card{background:var(--bg-card);border-radius:var(--radius);box-shadow:var(--shadow);padding:24px;margin-bottom:20px}
.admin-card h3{font-family:'Gowun Batang',serif;font-size:18px;margin-bottom:16px;color:var(--ink)}
.admin-card table{width:100%;border-collapse:collapse;font-size:14px}
.admin-card th{text-align:left;padding:8px 12px;border-bottom:2px solid var(--bg-deep);color:var(--ink-mute);font-size:12px;text-transform:uppercase;letter-spacing:.05em}
.admin-card td{padding:8px 12px;border-bottom:1px solid var(--bg-deep)}
.admin-card input,.admin-card select{padding:8px 12px;border:1.5px solid var(--bg-deep);border-radius:var(--radius-block);font-family:inherit;font-size:14px;background:var(--bg);outline:none;transition:border-color .15s}
.admin-card input:focus,.admin-card select:focus{border-color:var(--accent)}
.form-row{display:flex;gap:12px;align-items:end;flex-wrap:wrap;margin-bottom:16px}
.form-group{display:flex;flex-direction:column;gap:4px}
.form-group label{font-size:11px;font-weight:600;color:var(--ink-mute);text-transform:uppercase;letter-spacing:.06em}
.medal{font-size:18px}
.chip{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;background:var(--bg-deep);color:var(--ink-soft);margin:2px}
.chip .x{cursor:pointer;margin-left:4px;color:var(--red)}

/* ═══ Student 학습 영역 ═══ */
.student-view{max-width:1000px;margin:0 auto;padding:24px}
.student-tabs{display:flex;gap:0;border-bottom:2px solid var(--bg-deep);margin-bottom:24px}
.student-tab{padding:12px 24px;font-weight:700;font-size:14px;color:var(--ink-mute);cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .15s}
.student-tab:hover{color:var(--ink)}
.student-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.student-panel{display:none}
.student-panel.active{display:block}

/* Unit cards */
.unit-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px}
.unit-card{background:var(--bg-card);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px;cursor:pointer;transition:all .2s;border-left:4px solid var(--accent)}
.unit-card:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,.12)}
.unit-card h4{font-size:16px;margin-bottom:4px}
.unit-card .unit-card-ch{font-size:12px;color:var(--ink-mute)}
.unit-card .unit-card-count{font-size:12px;color:var(--accent);margin-top:8px;font-weight:600}

/* ═══ 학습 영역 (LEGO 블록) ═══ */
.exercise-area{max-width:900px;margin:0 auto}
.exercise-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.exercise-header h2{font-family:'Gowun Batang',serif;font-size:20px}

/* Unit header */
.unit-header{background:var(--bg-card);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px 24px;margin-bottom:20px}
.unit-header h2{font-family:'Gowun Batang',serif;font-size:20px;color:var(--ink);margin-bottom:4px}
.unit-header .unit-chapter{font-size:12px;color:var(--ink-mute)}

/* Worksheet Item */
.ws-item{background:var(--bg-card);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:20px;overflow:hidden;transition:all .3s}
.ws-item-header{padding:16px 20px;border-bottom:1px solid var(--bg-deep);display:flex;justify-content:space-between;align-items:center}
.ws-item-num{font-family:'Caveat',cursive;font-weight:700;font-size:28px;color:var(--accent)}
.ws-item-ko{font-size:14px;color:var(--ink-soft);font-style:italic}
.ws-item-body{padding:20px}

/* Block Bank */
.block-bank{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:16px;min-height:48px;padding:12px;background:var(--bg);border-radius:var(--radius-block);border:1.5px dashed var(--bg-deep)}
.block-bank-label{width:100%;text-align:center;font-size:11px;color:var(--ink-mute);font-weight:600;letter-spacing:.08em;text-transform:uppercase;margin-bottom:4px}

/* Word Block (LEGO brick) */
.block{display:inline-flex;align-items:center;padding:8px 16px;border-radius:var(--radius-block);font-weight:700;font-size:15px;color:#fff;cursor:pointer;transition:all .15s;user-select:none;position:relative;letter-spacing:.02em}
.block::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;border-radius:0 0 var(--radius-block) var(--radius-block);background:rgba(0,0,0,.15)}
.block:hover{transform:scale(1.06) rotate(-2deg)}
.block:active{transform:scale(.97)}
.block-icon{font-size:14px;margin-right:4px;display:inline-block}
.block.placed{opacity:.35;pointer-events:none;transform:none}
.block-det{background:var(--yellow);color:var(--ink)}.block-det::after{background:rgba(0,0,0,.1)}
.block-subject{background:var(--blue)}
.block-verb{background:var(--accent)}
.block-object{background:var(--green)}
.block-modifier{background:var(--purple)}
.block-prep{background:var(--pink)}
.block-distractor{background:var(--ink-mute)}

/* Sentence Slots */
.slots{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;padding:12px;background:var(--bg-deep);border-radius:var(--radius-block);min-height:52px}
.slot{min-width:60px;min-height:40px;border:2px dashed var(--ink-mute);border-radius:var(--radius-block);display:flex;align-items:center;justify-content:center;padding:6px 12px;font-size:12px;color:var(--ink-mute);transition:all .2s;position:relative}
.slot.filled{border-style:solid;border-color:var(--accent-soft)}
.slot.correct{border-color:var(--green);background:rgba(107,191,138,.1)}
.slot.correct::before{content:'';position:absolute;top:-8px;right:-8px;background:var(--green);color:#fff;width:18px;height:18px;border-radius:50%;font-size:11px;display:flex;align-items:center;justify-content:center;font-weight:700}
.slot.wrong{border-color:var(--red);background:rgba(232,93,93,.08);animation:shake .4s ease}
.slot .block{margin:0}
.slot .block::after{display:none}
.slot .block:hover{transform:none}

/* Score */
.score-bar{background:var(--bg-card);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px;text-align:center;margin-top:12px;display:none}
.score-bar.show{display:block}
.score-num{font-family:'Caveat',cursive;font-size:48px;font-weight:700;color:var(--accent)}
.score-label{font-size:13px;color:var(--ink-mute);margin-top:4px}

/* Celebration */
.celebration{position:fixed;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:1000;display:none}
.celebration.show{display:block}
.confetti{position:absolute;width:10px;height:10px;border-radius:2px;animation:fall 2s ease forwards}
@keyframes fall{0%{transform:translateY(-20px) rotate(0);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-6px)}40%,80%{transform:translateX(6px)}}

/* Loading */
.loading-dots{text-align:center;padding:40px;color:var(--ink-mute)}
.loading-dots .dot{display:inline-block;width:10px;height:10px;border-radius:50%;background:var(--accent);margin:0 4px;animation:bounce .6s ease infinite}
.loading-dots .dot:nth-child(2){animation-delay:.1s}.loading-dots .dot:nth-child(3){animation-delay:.2s}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}

/* Toast */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--ink);color:#fff;padding:10px 24px;border-radius:var(--radius-block);font-size:13px;font-weight:600;z-index:9999;transition:transform .3s;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0)}

/* 성적표 */
.score-table{width:100%;border-collapse:collapse;font-size:14px}
.score-table th{text-align:left;padding:8px 12px;border-bottom:2px solid var(--bg-deep);color:var(--ink-mute);font-size:12px}
.score-table td{padding:8px 12px;border-bottom:1px solid var(--bg-deep)}

/* 반응형 */
@media(max-width:768px){
  .admin-tabs,.student-tabs{flex-wrap:wrap}
  .admin-tab,.student-tab{padding:8px 16px;font-size:13px}
  .form-row{flex-direction:column}
  .unit-cards{grid-template-columns:1fr}
  .block{padding:6px 12px;font-size:13px}
  .login-box{padding:32px 24px}
}
</style>
</head>

// 커리큘럼 유닛 정보 조회 헬퍼
function getUnitInfo(unitKey) {
  // unitKey는 "ch2_sv" 형태 또는 "sv" 형태
  for (const [chKey, ch] of Object.entries(CURRICULUM)) {
    for (const [uKey, unit] of Object.entries(ch.units)) {
      const fullKey = chKey + '_' + uKey;
      if (fullKey === unitKey || uKey === unitKey) {
        return { chKey, uKey, fullKey, chTitle: ch.title, unitTitle: unit.title, exercises: unit.exercises };
      }
    }
  }
  return null;
}

// 모든 유닛 목록 (flat)
function getAllUnits() {
  const result = [];
  for (const [chKey, ch] of Object.entries(CURRICULUM)) {
    for (const [uKey, unit] of Object.entries(ch.units)) {
      result.push({ chKey, uKey, fullKey: chKey + '_' + uKey, chTitle: ch.title, unitTitle: unit.title, count: unit.exercises.length });
    }
  }
  return result;
}

function route() {
  const hash = location.hash || '#login';
  const app = document.getElementById('app');

  if (hash === '#login' || !currentUser) {
    renderLogin();
  } else if (hash === '#admin' && currentUser.role === 'admin') {
    renderAdmin();
  } else if (hash === '#student' && currentUser.role === 'student') {
    renderStudent();
  } else {
    location.hash = '#login';
  }
}

window.addEventListener('hashchange', route);

function renderLogin() {
  document.getElementById('app').innerHTML = `
    <div class="login-view">
      <div class="login-box">
        <div class="mascot">🧱</div>
        <div class="brand"><em>EPL</em> Learning</div>
        <div class="subtitle">LEGO 블록으로 영어 문장 만들기</div>
        <input type="text" id="login-name" placeholder="이름을 입력하세요" autocomplete="off">
        <input type="password" id="login-pw" placeholder="비밀번호 (4자리)" maxlength="4" autocomplete="off">
        <button class="login-btn" onclick="doLogin()">로그인</button>
        <div class="login-error" id="login-error"></div>
      </div>
    </div>
  `;
  // Enter 키로 로그인
  document.getElementById('login-pw').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });
  document.getElementById('login-name').addEventListener('keydown', e => { if(e.key==='Enter') document.getElementById('login-pw').focus(); });
}

async function doLogin() {
  const name = document.getElementById('login-name').value.trim();
  const pw = document.getElementById('login-pw').value.trim();
  const errEl = document.getElementById('login-error');
  errEl.textContent = '';

  if (!name || !pw) { errEl.textContent = '이름과 비밀번호를 입력하세요.'; return; }

  // 관리자 로그인
  if (name === 'admin') {
    try {
      const snap = await db.ref('config/adminPw').once('value');
      const adminPw = snap.val() || '1234';
      if (pw === adminPw) {
        currentUser = { name: 'admin', role: 'admin' };
        location.hash = '#admin';
        return;
      } else {
        errEl.textContent = '관리자 비밀번호가 틀립니다.';
        return;
      }
    } catch(e) {
      errEl.textContent = '서버 오류: ' + e.message;
      return;
    }
  }

  // 학생 로그인
  try {
    const snap = await db.ref('students/' + name).once('value');
    const data = snap.val();
    if (!data) { errEl.textContent = '등록되지 않은 학생입니다.'; return; }
    if (data.password !== pw) { errEl.textContent = '비밀번호가 틀립니다.'; return; }
    currentUser = { name, role: 'student' };
    location.hash = '#student';
  } catch(e) {
    errEl.textContent = '서버 오류: ' + e.message;
  }
}

function doLogout() {
  currentUser = null;
  location.hash = '#login';
}

async function refreshStudentList() {
  const area = document.getElementById('student-list-area');
  try {
    const [studentsSnap, scoresSnap] = await Promise.all([
      db.ref('students').once('value'),
      db.ref('scores').once('value')
    ]);
    const students = studentsSnap.val() || {};
    const scores = scoresSnap.val() || {};

    if (Object.keys(students).length === 0) {
      area.innerHTML = '<p style="color:var(--ink-mute)">등록된 학생이 없습니다.</p>';
      return;
    }

    let html = '<table><thead><tr><th>이름</th><th>비밀번호</th><th>총점</th><th>삭제</th></tr></thead><tbody>';
    for (const [name, info] of Object.entries(students)) {
      // 총점 계산
      const studentScores = scores[name] || {};
      let totalScore = 0, unitCount = 0;
      for (const s of Object.values(studentScores)) {
        totalScore += (s.score || 0);
        unitCount++;
      }
      html += `<tr>
        <td><strong>${name}</strong></td>
        <td>${info.password}</td>
        <td>${unitCount > 0 ? Math.round(totalScore / unitCount) : 0}점 (${unitCount}개 단원)</td>
        <td><button class="btn btn-danger btn-sm" onclick="deleteStudent('${name}')">삭제</button></td>
      </tr>`;
    }
    html += '</tbody></table>';
    area.innerHTML = html;
  } catch(e) {
    area.innerHTML = '<p style="color:var(--red)">오류: ' + e.message + '</p>';
  }
}

async function addStudent() {
  const name = document.getElementById('new-student-name').value.trim();
  const pw = document.getElementById('new-student-pw').value.trim();
  if (!name || !pw) { toast('이름과 비밀번호를 입력하세요'); return; }

  try {
    await db.ref('students/' + name).set({ password: pw, createdAt: new Date().toISOString() });

    document.getElementById('new-student-pw').value = '';
    toast(name + ' 학생 추가 완료');

async function deleteStudent(name) {

      db.ref('assignments/' + name).remove(),
      db.ref('scores/' + name).remove()

    toast(name + ' 삭제 완료');

    toast('학생과 단원을 선택하세요');

async function renderRankingTable(containerId) {
  const area = document.getElementById(containerId);
  try {
    const [studentsSnap, scoresSnap] = await Promise.all([
      db.ref('students').once('value'),
      db.ref('scores').once('value')
    ]);
    const students = studentsSnap.val() || {};
    const scores = scoresSnap.val() || {};

    const rankings = [];
    for (const name of Object.keys(students)) {
      const studentScores = scores[name] || {};
      let totalScore = 0, totalCorrect = 0, totalProblems = 0, unitCount = 0;
      for (const s of Object.values(studentScores)) {
        totalScore += (s.score || 0);
        totalCorrect += (s.correct || 0);
        totalProblems += (s.total || 0);
        unitCount++;
      }
      rankings.push({
        name,
        avgScore: unitCount > 0 ? Math.round(totalScore / unitCount) : 0,
        totalCorrect,
        totalProblems,
        accuracy: totalProblems > 0 ? Math.round(totalCorrect / totalProblems * 100) : 0,
        unitCount
      });
    }

    rankings.sort((a, b) => b.avgScore - a.avgScore || b.accuracy - a.accuracy);

    if (rankings.length === 0) {
      area.innerHTML = '<p style="color:var(--ink-mute)">학생이 없습니다.</p>';
      return;
    }

    const medals = ['🥇', '🥈', '🥉'];
    let html = '<table><thead><tr><th>순위</th><th>이름</th><th>평균 점수</th><th>문제 수</th><th>정확도</th></tr></thead><tbody>';
    rankings.forEach((r, i) => {
      const medal = i < 3 ? `<span class="medal">${medals[i]}</span> ` : '';
      html += `<tr>
        <td>${medal}${i + 1}</td>
        <td><strong>${r.name}</strong></td>
        <td>${r.avgScore}점</td>
        <td>${r.totalCorrect}/${r.totalProblems}</td>
        <td>${r.accuracy}%</td>
      </tr>`;
    });
    html += '</tbody></table>';
    area.innerHTML = html;
  } catch(e) { area.innerHTML = '<p style="color:var(--red)">오류</p>'; }
}

async function adminGenerateAI() {
  const unitKey = document.getElementById('ai-unit-select').value;
  const count = parseInt(document.getElementById('ai-gen-count').value) || 5;
  const btn = document.getElementById('ai-gen-btn');
  const status = document.getElementById('ai-gen-status');
  const info = getUnitInfo(unitKey);
  if (!info) { toast('단원을 찾을 수 없습니다'); return; }

  btn.disabled = true;
  status.textContent = 'AI가 문제를 생성하고 있습니다...';

  const prompt = `주제: ${info.unitTitle}, 레벨: Intermediate, 문항수: ${count}, 방해블록: 없음

영어 문장 조립 워크시트를 만드세요. 정확히 ${count}개의 문장을 단어 블록으로 분해하세요.
문법 주제는 "${info.unitTitle}"입니다. 이 문법에 맞는 다양한 문장 ${count}개를 만드세요.

JSON으로만 응답. compact JSON(들여쓰기 없이):
{"items":[{"target":"완성 문장","translation":"한국어 해석","blocks":[{"word":"단어","role":"det|subject|verb|object|modifier|prep","correct_pos":0}],"distractors":[]}]}

role 종류: det(관사/한정사), subject(주어), verb(동사), object(목적어), modifier(형용사/부사), prep(전치사)
correct_pos는 올바른 순서(0부터). 반드시 ${count}개 items를 만드세요.`;

  try {
    const res = await fetch(WORKER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 8192,
        system: '영어 학습 워크시트 생성기. compact JSON으로만 응답. 들여쓰기 금지.',
        messages: [{ role: 'user', content: prompt }]
      })
    });
    const data = await res.json();
    let raw = data.content?.[0]?.text || '';
    raw = raw.replace(/```json\s*/g, '').replace(/```\s*/g, '').trim();
    const fi = raw.indexOf('{'), li = raw.lastIndexOf('}');
    if (fi >= 0 && li > fi) raw = raw.substring(fi, li + 1);
    const aiData = JSON.parse(raw);

    // Firebase에 저장
    const items = aiData.items || [];
    for (const item of items) {
      await db.ref('custom_problems/' + unitKey).push(item);
    }

    status.textContent = `${items.length}개 문제가 생성되어 저장되었습니다!`;
    toast('AI 문제 생성 완료!');
    refreshProblemCounts();
  } catch (e) {
    console.error(e);
    status.textContent = '생성 실패: ' + e.message;
    toast('AI 생성 실패');
  } finally {
    btn.disabled = false;
  }
}

  const panel = document.getElementById('student-panel-learn');
  const info = getUnitInfo(unitKey);
  if (!info) { toast('단원을 찾을 수 없습니다'); return; }

  panel.innerHTML = '<div class="loading-dots"><span class="dot"></span><span class="dot"></span><span class="dot"></span><div style="margin-top:12px">블록을 조립하는 중...</div></div>';

  // 기본 문제 + 커스텀 문제 합치기
  let exercises = [...info.exercises];
  try {
    const snap = await db.ref('custom_problems/' + unitKey).once('value');
    const custom = snap.val() || {};
    for (const item of Object.values(custom)) {
      exercises.push(item);
    }
  } catch(e) { /* 커스텀 문제 없으면 무시 */ }

  currentExerciseData = { title: info.chTitle + ' - ' + info.unitTitle, items: exercises };
  currentExerciseUnitKey = unitKey;
  currentExerciseChKey = info.chKey;

  // 학습 UI 렌더링
  let html = `
    <div class="exercise-area">
      <div class="exercise-header">
        <div>
          <button class="btn btn-secondary btn-sm" onclick="loadStudentLearn()" style="margin-bottom:8px">&larr; 목록으로</button>
          <div class="unit-header">
            <div class="unit-chapter">${info.chTitle}</div>
            <h2>${info.unitTitle}</h2>
          </div>
        </div>
        <div>
          <button class="btn btn-success btn-sm" id="check-btn" onclick="checkAllStudent()">&#10003; 정답 확인</button>
          <button class="btn btn-secondary btn-sm" onclick="startExercise('${unitKey}')">&#8635; 다시 풀기</button>
          <button class="btn btn-secondary btn-sm" onclick="printWorksheet('${unitKey}')">🖨 프린트</button>
        </div>
      </div>
      <div id="worksheet"></div>
      <div class="score-bar" id="score-bar">
        <div class="score-num" id="score-num">0/0</div>
        <div class="score-label">정답률</div>
      </div>
    </div>`;
  panel.innerHTML = html;

  renderWorksheet();
}

// ═══════════════════════════════════════════
// 워크시트 렌더링 (LEGO 블록 UI)
// ═══════════════════════════════════════════
function renderWorksheet() {
  if (!currentExerciseData) return;
  const ws = document.getElementById('worksheet');
  ws.innerHTML = '';
  itemStates = [];

  currentExerciseData.items.forEach((item, idx) => {
    const allBlocks = [...item.blocks, ...(item.distractors || []).map(d => ({...d, correct_pos: -1, isDistractor: true}))];
    // 셔플
    for (let i = allBlocks.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [allBlocks[i], allBlocks[j]] = [allBlocks[j], allBlocks[i]];
    }

    const state = { blocks: allBlocks, slots: new Array(item.blocks.length).fill(null), checked: false };
    itemStates.push(state);

    const div = document.createElement('div');
    div.className = 'ws-item';
    div.id = 'item-' + idx;
    div.innerHTML = `
      <div class="ws-item-header">
        <span class="ws-item-num">#${idx + 1}</span>
        <span class="ws-item-ko">${item.translation}</span>
      </div>
      <div class="ws-item-body">
        <div class="block-bank" id="bank-${idx}">
          <div class="block-bank-label">🧩 블록을 클릭하세요</div>
          ${allBlocks.map((b, bi) => `<div class="block ${ROLE_CLASS[b.role] || 'block-distractor'}" data-item="${idx}" data-bidx="${bi}" onclick="pickBlock(${idx},${bi})"><span class="block-icon">${ROLE_ICON[b.role] || '📦'}</span>${b.word}</div>`).join('')}
        </div>
        <div class="slots" id="slots-${idx}">
          ${item.blocks.map((_, si) => `<div class="slot" id="slot-${idx}-${si}" data-item="${idx}" data-sidx="${si}" onclick="unpickSlot(${idx},${si})"><span style="font-size:18px;opacity:.3">🧩</span></div>`).join('')}
        </div>
      </div>
    `;
    ws.appendChild(div);
  });
}

// ═══════════════════════════════════════════
// 블록/슬롯 인터랙션 (기존과 동일)
// ═══════════════════════════════════════════
function pickBlock(itemIdx, blockIdx) {
  const state = itemStates[itemIdx];
  if (state.checked) return;
  const slotIdx = state.slots.indexOf(null);
  if (slotIdx === -1) return;

  state.slots[slotIdx] = blockIdx;
  const block = state.blocks[blockIdx];

  const bankBlocks = document.querySelectorAll(`#bank-${itemIdx} .block`);
  bankBlocks[blockIdx].classList.add('placed');

  const slot = document.getElementById(`slot-${itemIdx}-${slotIdx}`);
  slot.innerHTML = `<div class="block ${ROLE_CLASS[block.role] || 'block-distractor'}" style="cursor:pointer"><span class="block-icon">${ROLE_ICON[block.role] || '📦'}</span>${block.word}</div>`;
  slot.classList.add('filled');
}

function unpickSlot(itemIdx, slotIdx) {
  const state = itemStates[itemIdx];
  if (state.checked) return;
  const blockIdx = state.slots[slotIdx];
  if (blockIdx === null) return;

  state.slots[slotIdx] = null;

  const bankBlocks = document.querySelectorAll(`#bank-${itemIdx} .block`);
  bankBlocks[blockIdx].classList.remove('placed');

  const slot = document.getElementById(`slot-${itemIdx}-${slotIdx}`);
  slot.innerHTML = `<span style="font-size:18px;opacity:.3">🧩</span>`;
  slot.classList.remove('filled', 'correct', 'wrong');
}

// ═══════════════════════════════════════════
// 정답 확인 (학생용)
// ═══════════════════════════════════════════
// ═══════════════════════════════════════════
// 워크시트 프린트
// ═══════════════════════════════════════════
function printWorksheet(unitKey) {
  if (!currentExerciseData || !currentExerciseData.items.length) { toast('문제가 없습니다'); return; }
  const parts = unitKey.split('/');
  const ch = CURRICULUM[parts[0]];
  const unit = ch ? ch.units[parts[1]] : null;
  const chTitle = ch ? ch.title : '';
  const unitTitle = unit ? unit.title : '';
  const studentName = currentUser ? currentUser.name : '';

  const w = window.open('', '_blank');
  let html = `<!DOCTYPE html><html><head><meta charset="utf-8">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@latest/dist/web/static/pretendard.css">
    <link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Caveat:wght@600;700&display=swap" rel="stylesheet">
    <style>
      *{box-sizing:border-box;margin:0;padding:0}
      body{font-family:'Pretendard',sans-serif;padding:32px;color:#2D2926;font-size:14px}
      .print-header{text-align:center;margin-bottom:24px;padding-bottom:16px;border-bottom:2px solid #2D2926}
      .print-header h1{font-family:'Gowun Batang',serif;font-size:22px;margin-bottom:4px}
      .print-header .sub{font-size:13px;color:#5C554E;margin-bottom:8px}
      .print-meta{display:flex;justify-content:space-between;font-size:12px;color:#9A928A;margin-top:10px}
      .item{margin-bottom:20px;page-break-inside:avoid;border:1px solid #ddd;border-radius:8px;padding:16px}
      .item-num{font-family:'Caveat',cursive;font-size:22px;color:#E8734A;font-weight:700;margin-bottom:4px}
      .item-ko{font-size:13px;color:#5C554E;margin-bottom:12px}
      .blocks{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px;padding:10px;background:#FFF8F0;border-radius:6px;border:1px dashed #ddd}
      .block{display:inline-flex;align-items:center;gap:4px;padding:6px 14px;border-radius:6px;font-weight:700;font-size:14px;color:#fff}
      .block-det{background:#F4C84B;color:#2D2926}
      .block-subject{background:#5B9BD5}
      .block-verb{background:#E8734A}
      .block-object{background:#6BBF8A}
      .block-modifier{background:#9B7ED8}
      .block-prep{background:#E88BAF}
      .answer-line{display:flex;gap:6px;flex-wrap:wrap}
      .answer-slot{min-width:50px;height:32px;border-bottom:2px solid #9A928A;display:inline-block}
      @media print{body{padding:20px}.item{break-inside:avoid}}
    </style></head><body>`;

  html += `<div class="print-header">
    <h1>EPL영어학원 · 문장 조립 워크시트</h1>
    <div class="sub">${chTitle} · ${unitTitle}</div>
    <div class="print-meta"><span>이름: ${studentName || '_______________'}</span><span>날짜: _______________</span><span>점수: _______ / ${currentExerciseData.items.length}</span></div>
  </div>`;

  currentExerciseData.items.forEach((item, idx) => {
    // 블록을 섞어서 표시
    const shuffled = [...item.blocks, ...(item.distractors || [])].sort(() => Math.random() - 0.5);
    const roleClass = {det:'block-det',subject:'block-subject',verb:'block-verb',object:'block-object',modifier:'block-modifier',prep:'block-prep'};
    const roleIcon = {det:'🏷️',subject:'🐻',verb:'⚡',object:'🎁',modifier:'✨',prep:'🔗'};

    const blocksHtml = shuffled.map(b =>
      `<span class="block ${roleClass[b.role]||''}">${roleIcon[b.role]||''} ${b.word}</span>`
    ).join('');

    const slotsHtml = item.blocks.map(() =>
      `<span class="answer-slot"></span>`
    ).join('');

    html += `<div class="item">
      <div class="item-num">#${idx + 1}</div>
      <div class="item-ko">${item.translation}</div>
      <div class="blocks">${blocksHtml}</div>
      <div class="answer-line">${slotsHtml}</div>
    </div>`;
  });

  html += `</body></html>`;
  w.document.write(html);
  w.document.close();
  setTimeout(() => w.print(), 300);
}

async function checkAllStudent() {
  if (!currentExerciseData) return;
  let correct = 0, total = currentExerciseData.items.length;

  currentExerciseData.items.forEach((item, idx) => {
    const state = itemStates[idx];
    state.checked = true;
    let itemCorrect = true;

    item.blocks.forEach((_, si) => {
      const slot = document.getElementById(`slot-${idx}-${si}`);
      const placedIdx = state.slots[si];
      if (placedIdx === null) { slot.classList.add('wrong'); itemCorrect = false; return; }

      const placedBlock = state.blocks[placedIdx];
      const expectedWord = item.blocks[si].word;

      if (placedBlock.word === expectedWord) {
        slot.classList.add('correct');
      } else {
        slot.classList.add('wrong');
        itemCorrect = false;
      }
    });

    if (itemCorrect) correct++;
  });

  // 점수 표시
  document.getElementById('score-num').textContent = correct + '/' + total;
  document.getElementById('score-bar').classList.add('show');

  const score = Math.round(correct / total * 100);

  // Firebase에 성적 저장
  if (currentUser && currentExerciseUnitKey) {
    try {
      await db.ref('scores/' + currentUser.name + '/' + currentExerciseUnitKey).set({
        score,
        correct,
        total,
        timestamp: new Date().toISOString()
      });

      // 배정에서 제거 (완료 처리)
      await db.ref('assignments/' + currentUser.name + '/' + currentExerciseUnitKey).remove();
    } catch(e) { console.error('성적 저장 오류:', e); }
  }

  if (correct === total) {
    toast('🎉 전부 정답!');
    celebrate();
  } else {
    toast(correct + '/' + total + ' 정답');
  }

  // 확인 버튼 비활성화
  const checkBtn = document.getElementById('check-btn');
  if (checkBtn) checkBtn.disabled = true;
}

// ═══════════════════════════════════════════
// 축하 애니메이션
// ═══════════════════════════════════════════
function celebrate() {
  const el = document.getElementById('celebration');
  el.innerHTML = '';
  el.classList.add('show');
  const colors = ['#E8734A', '#5B9BD5', '#6BBF8A', '#9B7ED8', '#F4C84B', '#E88BAF'];
  for (let i = 0; i < 60; i++) {
    const c = document.createElement('div');
    c.className = 'confetti';
    c.style.cssText = `left:${Math.random()*100}%;top:${Math.random()*-20}%;background:${colors[i%colors.length]};width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;animation-delay:${Math.random()*.5}s;animation-duration:${1.5+Math.random()}s;border-radius:${Math.random()>.5?'50%':'2px'}`;
    el.appendChild(c);
  }
  setTimeout(() => { el.classList.remove('show'); el.innerHTML = ''; }, 3000);
}

// --- 내 성적 ---
async function loadStudentScores() {
  const panel = document.getElementById('student-panel-scores');
  panel.innerHTML = '<div class="loading-dots"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>';

  try {
    const snap = await db.ref('scores/' + currentUser.name).once('value');
    const scores = snap.val() || {};
    const keys = Object.keys(scores);

    if (keys.length === 0) {
      panel.innerHTML = '<div style="text-align:center;padding:40px;color:var(--ink-mute)"><p>아직 완료한 학습이 없습니다.</p></div>';
      return;
    }

    let totalScore = 0;
    let html = '<div class="admin-card"><h3>내 학습 성적</h3><table class="score-table"><thead><tr><th>단원</th><th>점수</th><th>정답</th><th>날짜</th></tr></thead><tbody>';
    for (const [unitKey, s] of Object.entries(scores)) {
      const info = getUnitInfo(unitKey);
      totalScore += s.score;
      const date = s.timestamp ? new Date(s.timestamp).toLocaleDateString('ko-KR') : '-';
      html += `<tr>
        <td>${info ? info.unitTitle : unitKey}</td>
        <td><strong>${s.score}점</strong></td>
        <td>${s.correct}/${s.total}</td>
        <td>${date}</td>
      </tr>`;
    }
    html += '</tbody></table>';
    html += `<div style="text-align:center;margin-top:16px;font-size:18px;font-weight:700;color:var(--accent)">평균: ${Math.round(totalScore / keys.length)}점 (${keys.length}개 단원)</div>`;
    html += '</div>';
    panel.innerHTML = html;
  } catch(e) {
    panel.innerHTML = '<p style="color:var(--red)">오류: ' + e.message + '</p>';
  }
}

// --- 학생 랭킹 ---

  const panel = document.getElementById('student-panel-ranking');
  panel.innerHTML = '<div class="admin-card"><h3>전체 랭킹</h3><div id="student-ranking-area"><div class="loading-dots"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div></div></div>';
  await renderRankingTable('student-ranking-area');
}
